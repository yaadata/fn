repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: go format check
        language: system
        entry: gofmt -l -d
        types: [go]
        exclude: ^vendor/
      - id: go-vet
        name: go vet check
        language: system
        entry: go vet ./...
        types: [go]
        exclude: ^vendor/
        pass_filenames: false
      - id: golangci-lint
        name: golang lint check
        language: system
        entry: mise exec -- golangci-lint run --config=.golangci-lint.yaml
        types: [go]
        exclude: ^vendor/
        pass_filenames: false
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        name: conventional commit check
        stages: [commit-msg]
        args:
          - --strict
          - --verbose
          - chore
          - docs
          - enhance
          - feat
          - fix
          - refactor
          - release
          - test
